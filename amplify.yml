version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
env:
  variables:
    VITE_API_URL: https://gramvaani-backend.whiteglacier-e8ae20da.centralindia.azurecontainerapps.io
    NODE_VERSION: '18'
